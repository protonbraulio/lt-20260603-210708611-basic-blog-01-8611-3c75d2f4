name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Configure Astro for GitHub Pages
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const configPath = [
            'astro.config.mjs',
            'astro.config.js',
            'astro.config.ts',
            'astro.config.mts',
            'astro.config.cts',
          ].find((candidate) => fs.existsSync(candidate));

          if (!configPath) {
            throw new Error('Astro config file not found.');
          }

          const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
          const site = 'https://' + owner + '.github.io/' + repo;
          const base = '/' + repo;
          let source = fs.readFileSync(configPath, 'utf8');

          if (/site:\s*['"][^'"]+['"]/.test(source)) {
            source = source.replace(/site:\s*['"][^'"]+['"]/, "site: '" + site + "'");
          } else {
            source = source.replace(/defineConfig\(\{/, "defineConfig({\n  site: '" + site + "',");
          }

          if (/base:\s*['"][^'"]+['"]/.test(source)) {
            source = source.replace(/base:\s*['"][^'"]+['"]/, "base: '" + base + "'");
          } else {
            source = source.replace(/defineConfig\(\{/, "defineConfig({\n  base: '" + base + "',");
          }

          fs.writeFileSync(configPath, source);
          NODE

      - name: Install dependencies
        run: pnpm install

      - name: Build site
        run: pnpm build

      - name: Rewrite root-relative paths for GitHub Pages
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
          const base = '/' + repo;
          const site = 'https://' + owner + '.github.io/' + repo;
          const pagesDevOrigin = 'https://' + repo + '.pages.dev';
          const dist = 'dist';

          function escapeRegExp(value) {
            const specialCharacters = new Set([
              '|',
              '\\',
              '{',
              '}',
              '(',
              ')',
              '[',
              ']',
              '^',
              '$',
              '+',
              '*',
              '?',
              '.',
            ]);

            return value
              .split('')
              .map((character) =>
                specialCharacters.has(character) ? '\\' + character : character,
              )
              .join('');
          }

          function rewritePagesDevUrls(contents) {
            const duplicatedBasePattern = new RegExp(
              escapeRegExp(pagesDevOrigin + '/' + repo) + "(?=$|[/?#\"'\\s<)])",
              'gu',
            );

            return contents
              .replace(duplicatedBasePattern, site)
              .replaceAll(pagesDevOrigin, site);
          }

          function walk(dir) {
            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const fullPath = path.join(dir, entry.name);
              return entry.isDirectory() ? walk(fullPath) : [fullPath];
            });
          }

          for (const file of walk(dist)) {
            if (!/\.(html|css|js|xml|txt)$/u.test(file)) {
              continue;
            }

            let contents = fs.readFileSync(file, 'utf8');
            contents = rewritePagesDevUrls(contents)
              .replace(/\b(href|src|action)=(["'])\/(["'])/giu, (_match, attr, quote) => {
                return attr + '=' + quote + base + '/' + quote;
              })
              .replace(/\b(href|src|action)=(["'])\/(?!\/)([^"'#?][^"']*)/giu, (_match, attr, quote, rest) => {
                if (rest === repo || rest.startsWith(repo + '/')) {
                  return attr + '=' + quote + '/' + rest;
                }

                return attr + '=' + quote + base + '/' + rest;
              })
              .replace(/url\(\/(?!\/)([^)'"]+)/giu, (_match, rest) => {
                if (rest === repo || rest.startsWith(repo + '/')) {
                  return 'url(/' + rest;
                }

                return 'url(' + base + '/' + rest;
              });

            fs.writeFileSync(file, contents);
          }
          NODE

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
